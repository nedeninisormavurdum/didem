<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Didem ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        h1 {
            font-size: 6rem;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2), 0 0 20px #ff4b4b;
            z-index: 10;
            animation: pulse 2s infinite ease-in-out;
            text-align: center;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); text-shadow: 2px 2px 20px rgba(255,255,255,0.8), 0 0 40px #ff4b4b; }
            100% { transform: scale(1); }
        }

        .heart {
            position: absolute;
            color: #ff4b4b;
            animation: float linear infinite;
            opacity: 0.7;
            text-shadow: 0 0 10px rgba(255, 75, 75, 0.5);
            z-index: 1;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-20vh) translateX(20px) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <h1>Didem <br> ❤️</h1>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Randomize heart types among a few options
            const hearts = ['❤️', '💖', '💕', '💗', '💘'];
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            
            // Randomize position, size, and animation duration
            const left = Math.random() * 100;
            const size = Math.random() * 2.5 + 1; // 1rem to 3.5rem
            const duration = Math.random() * 4 + 4; // 4s to 8s
            
            heart.style.left = left + 'vw';
            heart.style.fontSize = size + 'rem';
            heart.style.animationDuration = duration + 's';
            
            document.body.appendChild(heart);
            
            // Remove heart after animation ends to prevent DOM overload
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Create hearts continuously
        setInterval(createHeart, 250);
        
        // Initial batch of hearts so screen isn't empty at first
        for(let i = 0; i < 30; i++) {
            setTimeout(createHeart, Math.random() * 4000);
        }
    </script>
</body>
</html>
